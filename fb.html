<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <!-- Linking External CSS -->
    <link rel="stylesheet" href="fb.css">
</head>
<body>
    <div class="container">
        <!-- Left Section: Facebook Brand Branding -->
        <div class="brand-box">
            <h1 class="logo-text">facebook</h1>
            <p class="subtitle">Connect with friends and the world around you on Facebook.</p>
        </div>

        <!-- Right Section: Login Form Box -->
        <div class="form-box">
            <form action="#">
                <div class="input-container">
                    <input type="text" placeholder="Email or phone number" required>
                </div>
                <div class="input-container">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Log In</button>
                <a href="#" class="forgot-link">Forgot password?</a>
                <hr class="divider">
                <div class="create-account-container">
                    <button type="button" class="btn-new-account">Create new account</button>
                </div>
            </form>
            <p class="create-page-text">
                <a href="#"><strong>Create a Page</strong></a> for a celebrity, brand or business.
            </p>
        </div>
    </div>
</body>
</html>
